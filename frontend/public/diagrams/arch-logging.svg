<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'Open Sans',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#747474"/>
    </marker>
    <style>
      .t{fill:#222222}.m{fill:#747474}.w{fill:#ffffff}
      .card{fill:#F7F9FC;stroke:#E5EAF1;stroke-width:1.5}
      .h{font-weight:700}.flow{stroke:#747474;stroke-width:1.6;fill:none}
    </style>
  </defs>
  <rect width="1040" height="600" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" class="t h">Logging, analytics &amp; feedback — measure, optimize, learn</text>
  <text x="40" y="70" font-size="13" class="m">Every interaction is logged server-side (best-effort, never blocks the request) and joinable by a per-search correlation id.</text>

  <!-- signals -->
  <text x="40" y="104" font-size="13" class="t h">Signals (emitted server-side)</text>
  <g font-size="12">
    <rect x="40" y="116" width="226" height="44" rx="9" class="card"/>
    <text x="58" y="135" class="t h">Search</text><text x="58" y="152" class="m">/api/search</text>
    <rect x="278" y="116" width="240" height="44" rx="9" class="card"/>
    <text x="296" y="135" class="t h">AI turns</text><text x="296" y="152" class="m">/api/answer · ask · doc_qa</text>
    <rect x="530" y="116" width="226" height="44" rx="9" class="card"/>
    <text x="548" y="135" class="t h">Feedback 👍 / 👎</text><text x="548" y="152" class="m">/api/feedback</text>
    <rect x="768" y="116" width="232" height="44" rx="9" class="card"/>
    <text x="786" y="135" class="t h">Ingestion</text><text x="786" y="152" class="m">reconcile / ingest jobs</text>
  </g>
  <line x1="300" y1="160" x2="300" y2="198" class="flow" marker-end="url(#arr5)"/>

  <!-- BigQuery box -->
  <rect x="40" y="200" width="560" height="150" rx="12" fill="#0056B3"/>
  <text x="60" y="226" font-size="15" class="w h">BigQuery · ge_search_logs</text>
  <text x="60" y="245" font-size="11.5" class="w">four tables, joinable by search_id</text>
  <g font-size="11.5">
    <rect x="60" y="258" width="250" height="38" rx="8" fill="#ffffff"/>
    <text x="74" y="282" class="t h">searches <tspan class="m" font-weight="400">· query · groups · results</tspan></text>
    <rect x="320" y="258" width="260" height="38" rx="8" fill="#ffffff"/>
    <text x="334" y="282" class="t h">ai_turns <tspan class="m" font-weight="400">· model · web · latency</tspan></text>
    <rect x="60" y="302" width="250" height="38" rx="8" fill="#ffffff"/>
    <text x="74" y="326" class="t h">feedback <tspan class="m" font-weight="400">· document · vote</tspan></text>
    <rect x="320" y="302" width="260" height="38" rx="8" fill="#ffffff"/>
    <text x="334" y="326" class="t h">ingestion_log <tspan class="m" font-weight="400">· stage · status</tspan></text>
  </g>
  <line x1="600" y1="275" x2="636" y2="275" class="flow" marker-end="url(#arr5)"/>

  <!-- optimize -->
  <rect x="638" y="200" width="362" height="150" rx="12" class="card"/>
  <text x="658" y="226" font-size="14" class="t h">Track &amp; optimize</text>
  <g font-size="12" fill="#747474">
    <text x="658" y="250">• Relevance: zero-/low-result &amp; top queries</text>
    <text x="658" y="270">• AI attach rate, model mix &amp; failover</text>
    <text x="658" y="290">• Latency p50/p95 · cost · web-search use</text>
    <text x="658" y="310">• Usage by persona / group</text>
    <text x="658" y="330">• Ingestion health: failures, drift, bytes</text>
  </g>

  <!-- feedback / autotuning loop -->
  <text x="40" y="392" font-size="13" class="t h">Feedback &amp; relevance loop</text>
  <g font-size="12">
    <rect x="40" y="404" width="220" height="58" rx="10" fill="#92BE43"/>
    <text x="60" y="428" class="w h">👍 / 👎 on a result</text>
    <text x="60" y="447" class="w">per-document, in the UI</text>
    <line x1="260" y1="433" x2="296" y2="433" class="flow" marker-end="url(#arr5)"/>
    <rect x="298" y="404" width="250" height="58" rx="10" class="card"/>
    <text x="318" y="428" class="t h">VAIS user events</text>
    <text x="318" y="447" class="m">search · view-item (up-vote)</text>
    <line x1="548" y1="433" x2="584" y2="433" class="flow" marker-end="url(#arr5)"/>
    <rect x="586" y="404" width="230" height="58" rx="10" fill="#0063C3"/>
    <text x="606" y="428" class="w h">VAIS autotuning</text>
    <text x="606" y="447" class="w">learn-to-rank</text>
    <line x1="816" y1="433" x2="852" y2="433" class="flow" marker-end="url(#arr5)"/>
    <rect x="854" y="404" width="146" height="58" rx="10" class="card"/>
    <text x="874" y="428" class="t h">Better</text>
    <text x="874" y="447" class="m">ranking</text>
  </g>

  <!-- footer -->
  <rect x="40" y="492" width="960" height="78" rx="12" fill="#F7F9FC" stroke="#E5EAF1" stroke-width="1.5"/>
  <text x="60" y="516" font-size="13" class="t h">Correlate everything by search_id</text>
  <text x="60" y="536" font-size="12.5" class="m">/api/search mints a search_id; every AI turn and feedback vote echoes it — so you can join an answer (and the model that ran) or a vote back to its search.</text>
  <text x="60" y="555" font-size="12.5" class="m">Ready-to-run queries live in sql/analytics.sql (AI-usage funnel, model/latency, web-search adoption, feedback funnel, ingestion health).</text>
</svg>
